<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>P2P File Transfer</title>
    <style>
      body { margin: 0; padding: 2rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      h2 { margin-bottom: 1rem; }
      #status { margin: 1rem 0; font-weight: bold; color: #555; }
      #drop-zone { border: 2px dashed #aaa; border-radius: 8px; padding: 2rem; text-align: center; margin: 1rem 0; color: #aaa; }
      #drop-zone.active { border-color: #333; color: #333; }
      #progress { margin-top: 1rem; display: none; }
      progress { width: 100%; height: 20px; }
    </style>
  </head>
  <body>
    <h2>P2P File Transfer</h2>
    <div id="status">Not connected</div>
    <div id="path-info" style="font-family: monospace; color: #444; margin-bottom: 0.75rem;">
      Path: unknown
    </div>
    <div id="rate-info" style="font-family: monospace; color: #444; margin-bottom: 1rem;">
      Throughput: waiting for connection...
    </div>
    <pre id="debug-info" style="font-family: monospace; color: #444; background: #f7f7f7; border: 1px solid #ddd; padding: 0.75rem; border-radius: 6px; white-space: pre-wrap; margin-bottom: 1rem;">Debug: idle</pre>
    <div style="margin-bottom: 1rem;">
      <label>
        <input type="checkbox" id="direct-only-toggle" />
        Host-only ICE (no STUN — same subnet / fixes some Chrome DNS issues)
      </label>
      <span id="mode-info" style="margin-left: 0.75rem; font-family: monospace; color: #444;">Mode: same LAN (STUN)</span>
    </div>

    <div id="sender-ui">
      <div id="drop-zone">Drop a file here or click to select
        <br><br>
        <input type="file" id="file-input" />
      </div>
      <button id="send-btn" disabled>Send File</button>
    </div>

    <div id="progress">
      <p id="progress-label">0%</p>
      <progress id="progress-bar" value="0" max="100"></progress>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const ROOM_ID = 'test-room-123';
      const socket = io();
      let pc;
      let dataChannel;
      let pendingCandidates = [];
      let selectedPathLogged = false;
      let statsInterval = null;
      let lastBytesSent = null;
      let lastBytesReceived = null;
      let lastStatsTs = null;
      let localCandidateTypes = new Set();
      let remoteCandidateTypes = new Set();
      let iceErrors = [];
      const STUN_SERVERS = [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ];
      const directOnlyToggle = document.getElementById('direct-only-toggle');

      function setStatus(msg) {
        document.getElementById('status').textContent = msg;
        console.log('STATUS:', msg);
      }
      function setPathInfo(msg) {
        document.getElementById('path-info').textContent = 'Path: ' + msg;
        console.log('PATH:', msg);
      }
      function setRateInfo(msg) {
        document.getElementById('rate-info').textContent = 'Throughput: ' + msg;
      }
      function setDebugInfo(msg) {
        document.getElementById('debug-info').textContent = 'Debug: ' + msg;
      }
      function getModeLabel() {
        return directOnlyToggle.checked ? 'Host-only (same LAN, no STUN)' : 'Same LAN (STUN for discovery)';
      }
      function setModeInfo() {
        document.getElementById('mode-info').textContent = 'Mode: ' + getModeLabel();
      }
      function getIceServersForMode() {
        if (directOnlyToggle.checked) return [];
        return STUN_SERVERS;
      }

      const savedDirectOnly = localStorage.getItem('forceDirectMode') === '1';
      directOnlyToggle.checked = savedDirectOnly;
      setModeInfo();
      directOnlyToggle.addEventListener('change', () => {
        localStorage.setItem('forceDirectMode', directOnlyToggle.checked ? '1' : '0');
        setModeInfo();
        setStatus('Mode changed. Reconnect both tabs to apply.');
      });

      // ---- Join room ----
      socket.emit('join-room', ROOM_ID);
      setStatus('Waiting for other person to join...');

      // ---- Tab 1: other person joined, create offer ----
      socket.on('user-joined', async () => {
        setStatus('Other person joined! Creating offer...');
        pc = createPeerConnection();

        dataChannel = pc.createDataChannel('fileTransfer');
        setupDataChannel(dataChannel);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal', ROOM_ID, { offer });
        setStatus('Offer sent! Waiting for answer...');
      });

      // ---- Handle all signals ----
      socket.on('signal', async (data) => {
        if (!pc) {
          pc = createPeerConnection();
          pc.ondatachannel = (e) => {
            dataChannel = e.channel;
            setupDataChannel(dataChannel);
          };
        }

        if (data.offer) {
          await pc.setRemoteDescription(data.offer);
          for (const c of pendingCandidates) await pc.addIceCandidate(c);
          pendingCandidates = [];
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit('signal', ROOM_ID, { answer });
          setStatus('Answer sent!');
        }

        if (data.answer) {
          await pc.setRemoteDescription(data.answer);
          for (const c of pendingCandidates) await pc.addIceCandidate(c);
          pendingCandidates = [];
        }

        if (data.ice) {
          if (data.ice.type) remoteCandidateTypes.add(data.ice.type);
          if (pc.remoteDescription) {
            await pc.addIceCandidate(data.ice);
          } else {
            pendingCandidates.push(data.ice);
            console.log('Queued ICE candidate');
          }
        }
      });

      // ---- Create RTCPeerConnection ----
      function createPeerConnection() {
        if (statsInterval) {
          clearInterval(statsInterval);
          statsInterval = null;
        }
        lastBytesSent = null;
        lastBytesReceived = null;
        lastStatsTs = null;
        localCandidateTypes = new Set();
        remoteCandidateTypes = new Set();
        iceErrors = [];
        selectedPathLogged = false;
        setRateInfo('waiting for connection...');
        setDebugInfo('gathering ICE diagnostics...');

        const usingDirectOnly = directOnlyToggle.checked;
        const pc = new RTCPeerConnection({
          iceServers: getIceServersForMode(),
          iceTransportPolicy: 'all' // still allows host/srflx/relay based on configured servers
        });
        setPathInfo((usingDirectOnly ? 'Host-only ICE' : 'Same LAN (STUN)') + ' | gathering candidates...');

        pc.onicecandidate = (e) => {
          if (e.candidate) {
            if (e.candidate.type) localCandidateTypes.add(e.candidate.type);
            console.log('ICE candidate:', e.candidate.type, e.candidate.protocol);
            socket.emit('signal', ROOM_ID, { ice: e.candidate });
          } else {
            console.log('ICE gathering complete');
          }
        };
        pc.onicecandidateerror = (e) => {
          const err = `url=${e.url || 'n/a'} code=${e.errorCode || 'n/a'} text=${e.errorText || 'n/a'} addr=${e.address || 'n/a'} port=${e.port || 'n/a'}`;
          iceErrors.push(err);
          console.warn('ICE candidate error:', err);
        };

        pc.onicegatheringstatechange = () => {
          console.log('ICE gathering state:', pc.iceGatheringState);
        };

        pc.oniceconnectionstatechange = () => {
          console.log('ICE connection state:', pc.iceConnectionState);
          // Read selected ICE pair (host/srflx on same LAN; no TURN in this app).
          if ((pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') && !selectedPathLogged) {
            selectedPathLogged = true;
            logSelectedCandidatePair(pc);
          }
        };

        pc.onconnectionstatechange = () => {
          setStatus('Connection state: ' + pc.connectionState);
          if (pc.connectionState === 'connected') {
            setStatus('P2P Connected! 🎉 You can now send a file.');
            document.getElementById('send-btn').disabled = false;
            startThroughputMonitor(pc);
          } else if (pc.connectionState === 'failed' || pc.connectionState === 'closed' || pc.connectionState === 'disconnected') {
            if (statsInterval) {
              clearInterval(statsInterval);
              statsInterval = null;
            }
            setRateInfo('stopped (' + pc.connectionState + ')');
            if (pc.connectionState === 'failed') {
              dumpFailureDiagnostics(pc);
            }
          }
        };

        return pc;
      }

      async function logSelectedCandidatePair(pc) {
        try {
          const stats = await pc.getStats();
          let selectedPair = null;
          stats.forEach(report => {
            if (report.type === 'transport' && report.selectedCandidatePairId && !selectedPair) {
              selectedPair = stats.get(report.selectedCandidatePairId);
            }
          });
          if (!selectedPair) {
            stats.forEach(report => {
              if (report.type === 'candidate-pair' && report.nominated && report.state === 'succeeded' && !selectedPair) {
                selectedPair = report;
              }
            });
          }

          if (!selectedPair) {
            setPathInfo('selected pair not found');
            return;
          }

          const local = stats.get(selectedPair.localCandidateId);
          const remote = stats.get(selectedPair.remoteCandidateId);
          if (!local || !remote) {
            setPathInfo('pair found but candidate info missing');
            return;
          }

          const localType = local.candidateType || 'unknown';
          const remoteType = remote.candidateType || 'unknown';
          if (localType) localCandidateTypes.add(localType);
          if (remoteType) remoteCandidateTypes.add(remoteType);
          const localProto = local.protocol || 'n/a';
          const remoteProto = remote.protocol || 'n/a';
          const relayHint = localType === 'relay' || remoteType === 'relay' ? 'Relay' : 'Direct';
          setPathInfo(`${relayHint} | local=${localType}/${localProto} remote=${remoteType}/${remoteProto}`);
        } catch (err) {
          setPathInfo('stats read failed: ' + err.message);
        }
      }

      function formatRate(bytesPerSec) {
        if (!Number.isFinite(bytesPerSec) || bytesPerSec < 0) return 'n/a';
        if (bytesPerSec >= 1024 * 1024) return (bytesPerSec / (1024 * 1024)).toFixed(2) + ' MB/s';
        if (bytesPerSec >= 1024) return (bytesPerSec / 1024).toFixed(1) + ' KB/s';
        return bytesPerSec.toFixed(0) + ' B/s';
      }

      function startThroughputMonitor(pc) {
        if (statsInterval) clearInterval(statsInterval);
        statsInterval = setInterval(async () => {
          if (pc.connectionState !== 'connected') return;
          try {
            const stats = await pc.getStats();
            let bytesSent = 0;
            let bytesReceived = 0;
            let timestamp = null;

            stats.forEach((report) => {
              if (report.type === 'candidate-pair' && report.state === 'succeeded' && report.nominated) {
                if (typeof report.bytesSent === 'number') bytesSent = Math.max(bytesSent, report.bytesSent);
                if (typeof report.bytesReceived === 'number') bytesReceived = Math.max(bytesReceived, report.bytesReceived);
                if (typeof report.timestamp === 'number') timestamp = Math.max(timestamp || 0, report.timestamp);
              }
            });

            if (timestamp === null) return;
            if (lastStatsTs !== null && timestamp > lastStatsTs) {
              const dtSec = (timestamp - lastStatsTs) / 1000;
              const upRate = (bytesSent - lastBytesSent) / dtSec;
              const downRate = (bytesReceived - lastBytesReceived) / dtSec;
              setRateInfo(`up ${formatRate(upRate)} | down ${formatRate(downRate)}`);
            } else {
              setRateInfo('measuring...');
            }

            lastBytesSent = bytesSent;
            lastBytesReceived = bytesReceived;
            lastStatsTs = timestamp;
          } catch (err) {
            setRateInfo('stats read failed: ' + err.message);
          }
        }, 1000);
      }

      async function dumpFailureDiagnostics(pc) {
        try {
          const stats = await pc.getStats();
          let nominatedPairs = 0;
          let succeededPairs = 0;
          let inProgressPairs = 0;

          stats.forEach((report) => {
            if (report.type === 'candidate-pair') {
              if (report.nominated) nominatedPairs += 1;
              if (report.state === 'succeeded') succeededPairs += 1;
              if (report.state === 'in-progress') inProgressPairs += 1;
            }
            if (report.type === 'remote-candidate' && report.candidateType) {
              remoteCandidateTypes.add(report.candidateType);
            }
          });

          const localList = [...localCandidateTypes].join(', ') || 'none';
          const remoteList = [...remoteCandidateTypes].join(', ') || 'none';
          const errors = iceErrors.length ? iceErrors.join(' | ') : 'none';
          const summary = `failed | local=[${localList}] remote=[${remoteList}] pairs{succeeded=${succeededPairs}, inProgress=${inProgressPairs}, nominated=${nominatedPairs}} errors=[${errors}]`;
          setDebugInfo(summary);
          console.warn('ICE FAILURE DIAGNOSTICS:', summary);
        } catch (err) {
          setDebugInfo('failed to collect diagnostics: ' + err.message);
        }
      }

      // ---- Data channel setup ----
      let receivedChunks = [];
      let receivedBytes = 0;
      let fileMeta = null;

      function setupDataChannel(channel) {
        channel.binaryType = 'arraybuffer';

        channel.onopen = () => console.log('Data channel open!');

        channel.onmessage = ({ data }) => {
          if (typeof data === 'string') {
            fileMeta = JSON.parse(data);
            receivedChunks = [];
            receivedBytes = 0;
            setStatus('Receiving: ' + fileMeta.name);
            showProgress(true);
          } else {
            receivedChunks.push(data);
            receivedBytes += data.byteLength;

            const pct = Math.round((receivedBytes / fileMeta.size) * 100);
            updateProgress(pct);

            if (receivedBytes >= fileMeta.size) {
              const blob = new Blob(receivedChunks);
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = fileMeta.name;
              a.click();
              setStatus('File received: ' + fileMeta.name + ' ✅');
              showProgress(false);
            }
          }
        };
      }

      // ---- Send file ----
      document.getElementById('send-btn').addEventListener('click', () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) { alert('Pick a file first!'); return; }
        if (!dataChannel || dataChannel.readyState !== 'open') {
          alert('Data channel is not open yet.');
          return;
        }

        const CHUNK_SIZE = 16384;
        dataChannel.send(JSON.stringify({ name: file.name, size: file.size }));
        setStatus('Sending: ' + file.name);
        showProgress(true);

        dataChannel.bufferedAmountLowThreshold = 65536;
        sendFileWithBackpressure(file, CHUNK_SIZE).catch((err) => {
          console.error('Send failed:', err);
          setStatus('Send failed: ' + err.message);
          showProgress(false);
        });
      });

      async function waitForBufferedAmountLow(channel, threshold) {
        if (channel.bufferedAmount <= threshold) return;
        await new Promise((resolve) => {
          const previousHandler = channel.onbufferedamountlow;
          channel.onbufferedamountlow = () => {
            channel.onbufferedamountlow = previousHandler || null;
            resolve();
          };
        });
      }

      async function sendFileWithBackpressure(file, chunkSize) {
        let offset = 0;
        const maxBufferedBytes = 1024 * 1024;

        while (offset < file.size) {
          if (dataChannel.readyState !== 'open') {
            throw new Error('data channel closed during transfer');
          }

          await waitForBufferedAmountLow(dataChannel, maxBufferedBytes);

          const chunk = file.slice(offset, offset + chunkSize);
          const buf = await chunk.arrayBuffer();
          dataChannel.send(buf);
          offset += buf.byteLength;
          updateProgress(Math.min(Math.round((offset / file.size) * 100), 100));
        }

        setStatus('File sent! ✅');
        showProgress(false);
      }

      // ---- Progress helpers ----
      function showProgress(show) {
        document.getElementById('progress').style.display = show ? 'block' : 'none';
      }
      function updateProgress(pct) {
        document.getElementById('progress-bar').value = pct;
        document.getElementById('progress-label').textContent = pct + '%';
      }
    </script>
  </body>
</html>
